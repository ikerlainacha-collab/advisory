<!DOCTYPE html>
<html lang="es">

<title>PlanFinanciero</title>

<style>
:root{--navy:#0f2244;--navy2:#1a3560;--blue:#2563eb;--blue-light:#eff6ff;--green:#16a34a;--green-light:#f0fdf4;--red:#dc2626;--red-light:#fef2f2;--amber:#d97706;--amber-light:#fffbeb;--bg:#f1f4f9;--card:#ffffff;--border:#e2e8f0;--border2:#cbd5e1;--text:#1e293b;--muted:#64748b;--input-bg:#fefce8;--input-border:#fbbf24;--header-bg:#0f2244;--tab-active:#2563eb}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
.app-header{background:var(--navy);color:white;padding:0 24px;display:flex;align-items:center;gap:16px;height:52px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.app-logo{font-weight:700;font-size:15px;letter-spacing:-.3px;white-space:nowrap}.app-logo span{color:#60a5fa}
.tab-bar{background:var(--navy2);padding:0 24px;display:flex;gap:2px;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,.1)}
.tab-bar::-webkit-scrollbar{height:3px}.tab-bar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2)}
.tab{padding:10px 16px;font-size:12px;font-weight:500;color:rgba(255,255,255,.6);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}.tab:hover{color:rgba(255,255,255,.9)}.tab.active{color:#fff;border-bottom-color:#60a5fa}
.main-scroll{height:calc(100vh - 90px);overflow-y:auto}
.page{padding:24px;max-width:1400px;margin:0 auto}
.section{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:20px;overflow:hidden}
.section-header{background:var(--navy);color:white;padding:10px 16px;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase}
.page-title{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid var(--border);letter-spacing:-.3px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{background:#f8fafc;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap}
th:first-child{text-align:left}
td{padding:7px 12px;border-bottom:1px solid #f1f5f9;text-align:right;color:var(--text)}
td:first-child{text-align:left}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
.inp{background:var(--input-bg);border:1px solid var(--input-border);border-radius:4px;padding:3px 6px;font-family:'DM Mono',monospace;font-size:12px;width:100%;text-align:right;color:var(--text);outline:none}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 2px #dbeafe}
.computed{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}
.row-total td{background:#f0f4fa;font-weight:700;border-top:2px solid var(--border2);border-bottom:2px solid var(--border2)}
.row-subtotal td{background:#f8fafc;font-weight:600;border-top:1px solid var(--border2)}
.val-pos{color:var(--green);font-weight:600;font-family:'DM Mono',monospace}
.val-neg{color:var(--red);font-weight:600;font-family:'DM Mono',monospace}
.val-neutral{font-family:'DM Mono',monospace}
.val-warn{color:var(--amber);font-weight:600}
.kpi-grid{display:grid;gap:12px;padding:16px}
.kpi-grid-2{grid-template-columns:repeat(2,1fr)}.kpi-grid-3{grid-template-columns:repeat(3,1fr)}.kpi-grid-4{grid-template-columns:repeat(4,1fr)}.kpi-grid-5{grid-template-columns:repeat(5,1fr)}
.kpi{background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.kpi-label{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:4px}
.kpi-value{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;color:var(--navy)}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:2px}
.kpi.green{border-left:3px solid var(--green)}.kpi.red{border-left:3px solid var(--red)}.kpi.blue{border-left:3px solid var(--blue)}.kpi.amber{border-left:3px solid var(--amber)}

.badge-alta{background:#fef2f2;color:#dc2626}.badge-media{background:#fffbeb;color:#d97706}.badge-baja{background:#f0fdf4;color:#16a34a}
.badge-pendiente{background:#f1f5f9;color:#64748b}.badge-curso{background:#eff6ff;color:#2563eb}

.diag{padding:12px 16px;border-radius:8px;font-size:12px;font-weight:500;margin:12px 16px}
.diag-ok{background:var(--green-light);color:var(--green);border:1px solid #bbf7d0}
.diag-warn{background:var(--amber-light);color:var(--amber);border:1px solid #fde68a}
.diag-bad{background:var(--red-light);color:var(--red);border:1px solid #fecaca}
.diag-info{background:var(--blue-light);color:var(--blue);border:1px solid #bfdbfe}
.progress-wrap{background:#e2e8f0;border-radius:9999px;height:8px;overflow:hidden}
.progress-bar{height:100%;border-radius:9999px;transition:width .3s}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
.sub-label{padding:8px 16px;background:#f8fafc;color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border)}
.nota{font-size:11px;color:var(--muted);font-style:italic}
.bar-chart{padding:16px;display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-lbl{width:140px;font-size:11px;color:var(--text);text-align:right;flex-shrink:0}
.bar-track{flex:1;background:#f1f5f9;border-radius:4px;height:18px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px;font-size:10px;font-weight:600;color:white}
.bar-val{width:80px;font-size:11px;font-family:'DM Mono',monospace}
tr.highlight td{background:#eff6ff}
tr.section-row td{background:#f8fafc;font-weight:600;color:var(--navy)}
.shock-base td{font-weight:700;background:#eff6ff}

@media(max-width:900px){.two-col,.three-col{grid-template-columns:1fr}.kpi-grid-4,.kpi-grid-5{grid-template-columns:repeat(2,1fr)}}

.auth-logo{text-align:center;font-size:22px;font-weight:700;color:var(--navy);margin-bottom:6px;letter-spacing:-.5px}

.auth-btn{width:100%;padding:11px;background:var(--navy);color:white;border:none;border-radius:7px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;margin-top:6px}
.auth-btn:hover{background:#0a1830}
.auth-btn.primary{background:var(--blue)}.auth-btn.primary:hover{background:#1e40af}
.auth-error{background:#fef2f2;color:var(--red);border:1px solid #fecaca;padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:12px}
.auth-success{background:#f0fdf4;color:var(--green);border:1px solid #bbf7d0;padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:12px}
.auth-hint{font-size:11px;color:var(--muted);margin-top:4px;font-style:italic}
.auth-disclaimer{font-size:10.5px;color:var(--muted);background:#f8fafc;border-left:3px solid var(--amber);padding:10px 12px;border-radius:4px;margin-top:18px;line-height:1.5}

/* MODAL OVERLAY */
.modal-overlay{position:fixed;inset:0;background:rgba(15,34,68,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.modal{background:white;border-radius:12px;width:100%;max-width:640px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--navy);color:white;border-radius:12px 12px 0 0}
.modal-title{font-size:14px;font-weight:600;letter-spacing:.3px}

.modal-body{padding:18px 20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:#f8fafc;border-radius:0 0 12px 12px}
.modal-btn{padding:8px 16px;border-radius:6px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:white;color:var(--text)}
.modal-btn:hover{background:#f1f5f9}
.modal-btn.primary{background:var(--blue);color:white;border-color:var(--blue)}
.modal-btn.primary:hover{background:#1e40af}
.modal-btn.success{background:var(--green);color:white;border-color:var(--green)}
.modal-btn.success:hover{background:#15803d}
.email-preview{background:#f8fafc;border:1px solid var(--border);border-radius:6px;padding:12px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text);white-space:pre-wrap;max-height:340px;overflow-y:auto;line-height:1.5}

/* HEADER USER MENU */
.user-menu{position:relative}
.user-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;display:flex;align-items:center;gap:6px}
.user-btn:hover{background:rgba(255,255,255,.18)}
.user-dropdown{position:absolute;top:calc(100% + 6px);right:0;background:white;border:1px solid var(--border2);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.15);min-width:200px;overflow:hidden;z-index:200}
.user-dropdown-item{padding:9px 14px;font-size:12px;color:var(--text);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit;display:flex;align-items:center;gap:8px}
.user-dropdown-item:hover{background:#f1f5f9}
.user-dropdown-item.danger{color:var(--red);border-top:1px solid var(--border)}
.send-advisor-btn{background:var(--blue);border:none;color:white;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;font-weight:600;display:flex;align-items:center;gap:6px}
.send-advisor-btn:hover{background:#1e40af}
</style>

<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script>
const F = {
  pmt(rate,nper,pv){if(rate===0)return pv/nper;return pv*rate/(1-Math.pow(1+rate,-nper))},
  pmtFV(rate,nper,fv,pv0=0){if(rate===0)return(fv-pv0)/nper;const factor=Math.pow(1+rate,nper);return(fv-pv0*factor)*rate/(factor-1)},
  pvAnnuity(rate,nper,pmt){if(rate===0)return pmt*nper;return pmt*(1-Math.pow(1+rate,-nper))/rate},
  fvGrowingAnnuity(pmt0,r,g,n){if(n<=0)return 0;if(Math.abs(r-g)<1e-9)return pmt0*n*Math.pow(1+r,n);return pmt0*(Math.pow(1+r,n)-Math.pow(1+g,n))/(r-g)},
  pvGrowingAnnuity(pmt0,r,g,n){if(n<=0)return 0;if(Math.abs(r-g)<1e-9)return pmt0*n/(1+r);return pmt0*(1-Math.pow((1+g)/(1+r),n))/(r-g)},
  nper(rate,pmt,pv){if(rate===0)return pv/pmt;return-Math.log(1-rate*pv/pmt)/Math.log(1+rate)},
  eur(n,dec=0){if(n===null||n===undefined||isNaN(n)||!isFinite(n))return'—';return new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR',minimumFractionDigits:dec,maximumFractionDigits:dec}).format(n)},
  num(n,dec=0){if(n===null||n===undefined||isNaN(n)||!isFinite(n))return'—';return new Intl.NumberFormat('es-ES',{minimumFractionDigits:dec,maximumFractionDigits:dec}).format(n)},
  pct(n,dec=1){if(n===null||n===undefined||isNaN(n)||!isFinite(n))return'—';return(n*100).toFixed(dec)+'%'},
  valClass(n){if(!isFinite(n))return'';return n>=0?'val-pos':'val-neg'},
  amortSchedule(capital,rate,plazo){const r=rate/12;const n=plazo*12;const cuota=F.pmt(r,n,capital);const rows=[];let saldo=capital;for(let anio=1;anio<=plazo;anio++){let interesesAnio=0,amortAnio=0;for(let m=1;m<=12;m++){const interes=saldo*r;const amort=cuota-interes;interesesAnio+=interes;amortAnio+=amort;saldo-=amort}rows.push({anio,cuota:cuota*12,intereses:interesesAnio,amortizacion:amortAnio,capitalPendiente:Math.max(0,saldo)})}return rows},
  amortScheduleAleman(capital,rate,plazo){const r=rate/12;const n=plazo*12;const amortMensual=capital/n;const rows=[];let saldo=capital;for(let anio=1;anio<=plazo;anio++){let interesesAnio=0,amortAnio=0,cuotaAnio=0;for(let m=1;m<=12;m++){const interes=saldo*r;interesesAnio+=interes;amortAnio+=amortMensual;cuotaAnio+=(interes+amortMensual);saldo-=amortMensual}rows.push({anio,cuota:cuotaAnio,intereses:interesesAnio,amortizacion:amortAnio,capitalPendiente:Math.max(0,saldo)})}return rows},
  amortScheduleAmericano(capital,rate,plazo){const r=rate/12;const cuotaMensual=capital*r;const rows=[];for(let anio=1;anio<=plazo;anio++){const isLast=anio===plazo;const intereses=cuotaMensual*12;const amortizacion=isLast?capital:0;rows.push({anio,cuota:intereses+amortizacion,intereses,amortizacion,capitalPendiente:isLast?0:capital})}return rows},
  amortScheduleByType(tipo,capital,rate,plazo){if(capital<=0||plazo<=0)return[];switch(tipo){case 'aleman':return F.amortScheduleAleman(capital,rate,plazo);case 'americano':return F.amortScheduleAmericano(capital,rate,plazo);case 'frances':default:return F.amortSchedule(capital,rate,plazo)}},
  cuotaMensualByType(tipo,capital,rate,plazo){if(capital<=0||plazo<=0)return 0;const r=rate/12;const n=plazo*12;switch(tipo){case 'aleman':return capital/n+capital*r;case 'americano':return capital*r;case 'frances':default:return F.pmt(r,n,capital)}}
};
window.F=F;

// ===== CONFIGURACIÓN =====
// Email del asesor donde llegan los resúmenes de los clientes.
// Se usa Formsubmit.co (sin registro). La primera vez que un cliente envíe un
// resumen, recibirás un email de confirmación de Formsubmit. Pulsa el enlace
// "Confirm email" UNA SOLA VEZ y a partir de entonces todos los envíos llegan
// automáticamente. No hay claves ni cuentas que mantener.
const ADVISOR_EMAIL = 'ikerlainach@gmail.com';

// CLIENT TOKEN + PIN HELPERS
const CLIENT = {
  parseUrl() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('c');
    const name = params.get('n');
    const pinHash = params.get('p');
    return token ? { token, name: name ? decodeURIComponent(name) : 'Cliente', pinHash } : null;
  },
  generateToken() {
    if (crypto.randomUUID) return crypto.randomUUID();
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  },
  generatePin() {
    // 4-digit PIN, avoiding leading zeros for cleaner UX
    return String(Math.floor(1000 + Math.random() * 9000));
  },
  async hashPin(pin) {
    const buf = new TextEncoder().encode('pf_pin_v1_' + pin);
    const h = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, '0')).join('').slice(0, 16);
  },
  buildLink(token, name, pinHash) {
    const base = window.location.origin + window.location.pathname;
    let url = `${base}?c=${token}&n=${encodeURIComponent(name || 'Cliente')}`;
    if (pinHash) url += `&p=${pinHash}`;
    return url;
  },
  getClientList() {
    try { return JSON.parse(localStorage.getItem('pf_advisor_clients') || '[]'); }
    catch { return []; }
  },
  saveClientList(list) {
    localStorage.setItem('pf_advisor_clients', JSON.stringify(list));
  },
  isUnlocked(token) {
    try { return localStorage.getItem(`pf_unlocked_${token}`) === '1'; } catch { return false; }
  },
  setUnlocked(token) {
    try { localStorage.setItem(`pf_unlocked_${token}`, '1'); } catch {}
  },
  getAttempts(token) {
    try { return JSON.parse(localStorage.getItem(`pf_attempts_${token}`) || '[]'); } catch { return []; }
  },
  addAttempt(token) {
    const list = CLIENT.getAttempts(token);
    list.push(Date.now());
    try { localStorage.setItem(`pf_attempts_${token}`, JSON.stringify(list.slice(-20))); } catch {}
    return list;
  },
};
window.CLIENT = CLIENT;

// Send email directly via Formsubmit (no signup required)
const sendEmailDirect = async ({ subject, body, clientName }) => {
  try {
    const res = await fetch(`https://formsubmit.co/ajax/${ADVISOR_EMAIL}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        _subject: subject,
        _captcha: 'false',
        _template: 'box',
        cliente: clientName || 'Cliente',
        resumen: body,
      })
    });
    const data = await res.json();
    return { ok: data.success === 'true' || data.success === true, response: data };
  } catch (e) {
    return { ok: false, error: e.message };
  }
};
window.sendEmailDirect = sendEmailDirect;
</script>

<script type="text/babel">
const { useState, useEffect } = React;

const Sheet1 = ({ state, setState }) => {
  const { gastos, ingresos, fondoEmergencia } = state;
  const [editingGastos, setEditingGastos] = useState(false);
  const updateGasto = (id, field, val) => setState(s => ({ ...s, gastos: s.gastos.map(g => g.id === id ? { ...g, [field]: field === 'mensual' ? parseFloat(val) || 0 : val } : g) }));
  const removeGasto = (id) => setState(s => ({ ...s, gastos: s.gastos.filter(g => g.id !== id).map((g, i) => ({ ...g, id: i + 1 })) }));
  const addGasto = () => setState(s => { const maxId = s.gastos.length > 0 ? Math.max(...s.gastos.map(g => g.id)) : 0; return { ...s, gastos: [...s.gastos, { id: maxId + 1, categoria: 'Nueva partida', mensual: 0, tipo: 'Variable', clase: 'Personal', notas: '', confirmed: false }] }; });
  const updateIngreso = (id, field, val) => setState(s => ({ ...s, ingresos: s.ingresos.map(g => g.id === id ? { ...g, [field]: ['mensualBruto','tipoMarginal'].includes(field) ? parseFloat(val) || 0 : val } : g) }));
  const removeIngreso = (id) => setState(s => ({ ...s, ingresos: s.ingresos.filter(i => i.id !== id).map((i, idx) => ({ ...i, id: idx + 1 })) }));
  const confirmGasto = (id) => setState(s => ({ ...s, gastos: s.gastos.map(g => g.id === id ? { ...g, confirmed: true } : g) }));
  const confirmIngreso = (id) => setState(s => ({ ...s, ingresos: s.ingresos.map(i => i.id === id ? { ...i, confirmed: true } : i) }));
  const addIngreso = () => setState(s => { const maxId = s.ingresos.length > 0 ? Math.max(...s.ingresos.map(i => i.id)) : 0; return { ...s, ingresos: [...s.ingresos, { id: maxId + 1, fuente: 'Nueva fuente', mensualBruto: 0, tipoFiscal: 'Otros', tipoMarginal: 0.25, notas: '', confirmed: false }] }; });
  const gastosFijos = gastos.filter(g => g.tipo === 'Fijo').reduce((a, g) => a + g.mensual, 0);
  const gastosVariables = gastos.filter(g => g.tipo === 'Variable').reduce((a, g) => a + g.mensual, 0);
  const totalGastos = gastosFijos + gastosVariables;
  const ingresosCalc = ingresos.map(i => ({ ...i, anualBruto: i.mensualBruto * 12, anualNeto: i.mensualBruto * 12 * (1 - i.tipoMarginal), mensualNeto: i.mensualBruto * (1 - i.tipoMarginal) }));
  const totalMensualBruto = ingresosCalc.reduce((a, i) => a + i.mensualBruto, 0);
  const totalMensualNeto = ingresosCalc.reduce((a, i) => a + i.mensualNeto, 0);
  const totalAnualNeto = ingresosCalc.reduce((a, i) => a + i.anualNeto, 0);
  const superavitMensual = totalMensualNeto - totalGastos;
  const superavitAnual = totalAnualNeto - totalGastos * 12;
  const tasaAhorro = totalMensualNeto > 0 ? superavitMensual / totalMensualNeto : 0;
  const obj3m = gastosFijos * 3, obj6m = gastosFijos * 6, obj12m = gastosFijos * 12;
  const coberturaFondo = obj6m > 0 ? fondoEmergencia / obj6m : 0;
  const gastoClasses = [...new Set(gastos.map(g => g.clase))];
  const claseTotals = gastoClasses.map(cls => ({ cls, total: gastos.filter(g => g.clase === cls).reduce((a, g) => a + g.mensual, 0) })).sort((a, b) => b.total - a.total);
  return (
    <div className="page">
      <div className="page-title">PLAN FINANCIERO — GASTOS E INGRESOS HOY</div>
      <div className="kpi-grid kpi-grid-4" style={{marginBottom:20}}>
        <div className={`kpi ${superavitMensual>=0?'green':'red'}`}><div className="kpi-label">Superávit / Déficit Mensual</div><div className={`kpi-value ${F.valClass(superavitMensual)}`}>{F.eur(superavitMensual)}</div><div className="kpi-sub">Neto mensual tras gastos</div></div>
        <div className="kpi blue"><div className="kpi-label">Tasa de Ahorro</div><div className="kpi-value">{F.pct(tasaAhorro)}</div><div className="kpi-sub">% ingresos netos ahorrados</div></div>
        <div className="kpi"><div className="kpi-label">Ingresos Netos Mensuales</div><div className="kpi-value val-neutral">{F.eur(totalMensualNeto)}</div></div>
        <div className="kpi"><div className="kpi-label">Total Gastos Mensuales</div><div className="kpi-value val-neutral">{F.eur(totalGastos)}</div></div>
      </div>
      <div className="two-col">
        <div>
          <div className="section">
            <div className="section-header">GASTOS — Valores Mensuales y Anuales</div>
            <div className="table-scroll"><table><thead><tr><th style={{width:24}}>#</th><th style={{textAlign:'left'}}>Categoría</th><th>Mensual (€)</th><th>Anual (€)</th><th>Tipo</th><th>Clase</th><th style={{width:32}}></th></tr></thead>
            <tbody>
              {gastos.map(g => (
                <tr key={g.id} style={{background:(!g.confirmed||editingGastos)?'#f0fdf4':''}}>
                  <td style={{color:'var(--muted)'}}>{g.id}</td>
                  <td>{(!g.confirmed||editingGastos)?<input className="inp" type="text" value={g.categoria} onChange={e=>updateGasto(g.id,'categoria',e.target.value)} style={{width:'100%',minWidth:140,textAlign:'left'}}/>:<span>{g.categoria}</span>}</td>
                  <td>{(!g.confirmed||editingGastos)?<input className="inp" type="number" value={g.mensual} onChange={e=>updateGasto(g.id,'mensual',e.target.value)} style={{width:80}}/>:<span className="val-neutral">{F.eur(g.mensual)}</span>}</td>
                  <td className="computed">{F.num(g.mensual*12)}</td>
                  <td>{(!g.confirmed||editingGastos)?<select className="inp" value={g.tipo} onChange={e=>updateGasto(g.id,'tipo',e.target.value)} style={{width:80}}><option>Fijo</option><option>Variable</option></select>:<span className={`badge badge-${g.tipo.toLowerCase()}`}>{g.tipo}</span>}</td>
                  <td>{(!g.confirmed||editingGastos)?<select className="inp" value={g.clase} onChange={e=>updateGasto(g.id,'clase',e.target.value)} style={{width:90}}>{['Hogar','Hipoteca','Impuestos','Seguros','Transporte','Educación','Personal','Salud','Reserva','Otros'].map(c=><option key={c}>{c}</option>)}</select>:<span style={{color:'var(--muted)',fontSize:11}}>{g.clase}</span>}</td>
                  <td style={{display:'flex',gap:4,alignItems:'center'}}>
                    {!g.confirmed&&<button onClick={()=>confirmGasto(g.id)} style={{background:'var(--green)',color:'white',border:'none',borderRadius:4,cursor:'pointer',fontSize:13,padding:'2px 7px',fontWeight:700}}>✓</button>}
                    <button onClick={()=>removeGasto(g.id)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--red)',fontSize:15,lineHeight:1,padding:'2px 4px'}}>✕</button>
                  </td>
                </tr>
              ))}
              <tr><td colSpan={7} style={{padding:'6px 12px'}}><div style={{display:'flex',gap:8,alignItems:'center'}}><button onClick={addGasto} style={{background:'var(--blue)',color:'white',border:'none',borderRadius:6,padding:'5px 14px',cursor:'pointer',fontSize:12,fontFamily:'inherit',fontWeight:500}}>+ Añadir partida</button><button onClick={()=>setEditingGastos(e=>!e)} style={{background:editingGastos?'var(--green)':'#64748b',color:'white',border:'none',borderRadius:6,padding:'5px 12px',cursor:'pointer',fontSize:12,fontFamily:'inherit',fontWeight:500}}>{editingGastos?'✓ Listo':'✏ Editar'}</button></div></td></tr>
              <tr className="row-subtotal"><td colSpan={2}>Subtotal FIJOS</td><td className="val-neutral">{F.eur(gastosFijos)}</td><td className="val-neutral">{F.eur(gastosFijos*12)}</td><td colSpan={3}></td></tr>
              <tr className="row-subtotal"><td colSpan={2}>Subtotal VARIABLES</td><td className="val-neutral">{F.eur(gastosVariables)}</td><td className="val-neutral">{F.eur(gastosVariables*12)}</td><td colSpan={3}></td></tr>
              <tr className="row-total"><td colSpan={2}>TOTAL GASTOS</td><td className="val-neutral">{F.eur(totalGastos)}</td><td className="val-neutral">{F.eur(totalGastos*12)}</td><td colSpan={3}></td></tr>
            </tbody></table></div>
          </div>
          <div className="section">
            <div className="section-header">FONDO DE EMERGENCIA</div>
            <div className="table-scroll"><table><tbody>
              <tr><td>Gasto mensual fijo (base)</td><td className="val-neutral">{F.eur(gastosFijos)}</td></tr>
              <tr><td>Objetivo 3 meses</td><td className="val-neutral">{F.eur(obj3m)}</td></tr>
              <tr><td>Objetivo 6 meses <span className="nota">(recomendado)</span></td><td className="val-neutral">{F.eur(obj6m)}</td></tr>
              <tr><td>Objetivo 12 meses <span className="nota">(conservador)</span></td><td className="val-neutral">{F.eur(obj12m)}</td></tr>
              <tr><td>Fondo actual (€)</td><td><input className="inp" type="number" value={fondoEmergencia} onChange={e=>setState(s=>({...s,fondoEmergencia:parseFloat(e.target.value)||0}))} style={{width:100}}/></td></tr>
              <tr><td>% cobertura sobre 6 meses</td><td className={coberturaFondo>=1?'val-pos':coberturaFondo>=0.5?'val-warn':'val-neg'}>{F.pct(coberturaFondo)}</td></tr>
            </tbody></table></div>
            <div style={{padding:'8px 16px'}}><div className="progress-wrap"><div className="progress-bar" style={{width:Math.min(100,coberturaFondo*100)+'%',background:coberturaFondo>=1?'var(--green)':coberturaFondo>=0.5?'var(--amber)':'var(--red)'}}/></div></div>
          </div>
          <div className="section"><div className="section-header">Distribución por Categoría</div>
            <div className="bar-chart">{claseTotals.filter(c=>c.total>0).map(c=>(<div className="bar-row" key={c.cls}><div className="bar-lbl">{c.cls}</div><div className="bar-track"><div className="bar-fill" style={{width:Math.min(100,c.total/totalGastos*100)+'%',background:'var(--blue)'}}>{c.total/totalGastos>0.08?F.pct(c.total/totalGastos):''}</div></div><div className="bar-val">{F.eur(c.total)}</div></div>))}</div>
          </div>
        </div>
        <div>
          <div className="section">
            <div className="section-header">INGRESOS — Valores Brutos y Netos</div>
            <div className="table-scroll"><table><thead><tr><th style={{width:24}}>#</th><th style={{textAlign:'left'}}>Fuente</th><th>Mensual Bruto</th><th>Tipo Marginal</th><th>Mensual Neto</th><th>Anual Neto</th><th style={{width:32}}></th></tr></thead>
            <tbody>
              {ingresosCalc.map(i=>(<tr key={i.id} style={{background:i.confirmed?'':'#f0fdf4'}}>
                <td style={{color:'var(--muted)'}}>{i.id}</td>
                <td>{i.confirmed?<div><span>{i.fuente}</span>{i.notas&&<div className="nota">{i.notas}</div>}</div>:<input className="inp" type="text" value={i.fuente} autoFocus onChange={e=>updateIngreso(i.id,'fuente',e.target.value)} style={{width:'100%',minWidth:140,textAlign:'left'}}/>}</td>
                <td>{i.confirmed?<span className="val-neutral">{F.eur(i.mensualBruto)}</span>:<input className="inp" type="number" value={i.mensualBruto} onChange={e=>updateIngreso(i.id,'mensualBruto',e.target.value)} style={{width:80}}/>}</td>
                <td>{i.confirmed?<span className="computed">{F.pct(i.tipoMarginal)}</span>:<input className="inp" type="number" step="0.01" value={i.tipoMarginal} onChange={e=>updateIngreso(i.id,'tipoMarginal',e.target.value)} style={{width:60}}/>}</td>
                <td className="computed">{F.eur(i.mensualNeto)}</td><td className="computed">{F.eur(i.anualNeto)}</td>
                <td style={{display:'flex',gap:4,alignItems:'center'}}>
                  {!i.confirmed&&<button onClick={()=>confirmIngreso(i.id)} style={{background:'var(--green)',color:'white',border:'none',borderRadius:4,cursor:'pointer',fontSize:13,padding:'2px 7px',fontWeight:700}}>✓</button>}
                  <button onClick={()=>removeIngreso(i.id)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--red)',fontSize:15,lineHeight:1,padding:'2px 4px'}}>✕</button>
                </td>
              </tr>))}
              <tr><td colSpan={7} style={{padding:'6px 12px'}}><button onClick={addIngreso} style={{background:'var(--blue)',color:'white',border:'none',borderRadius:6,padding:'5px 14px',cursor:'pointer',fontSize:12,fontFamily:'inherit',fontWeight:500}}>+ Añadir fuente de ingreso</button></td></tr>
              <tr className="row-total"><td colSpan={2}>TOTAL INGRESOS</td><td className="val-neutral">{F.eur(totalMensualBruto)}</td><td></td><td className="val-neutral">{F.eur(totalMensualNeto)}</td><td className="val-neutral">{F.eur(totalAnualNeto)}</td><td></td></tr>
            </tbody></table></div>
          </div>
          <div className="section"><div className="section-header">RESUMEN — EQUILIBRIO FINANCIERO HOY</div>
            <div className="table-scroll"><table><tbody>
              <tr><td>Ingresos netos mensuales</td><td className="val-pos">{F.eur(totalMensualNeto)}</td></tr>
              <tr><td>Gastos mensuales totales</td><td className="val-neg">−{F.eur(totalGastos)}</td></tr>
              <tr className="row-subtotal"><td>Superávit / Déficit mensual</td><td className={F.valClass(superavitMensual)}>{F.eur(superavitMensual)}</td></tr>
              <tr><td>Ingresos netos anuales</td><td className="val-pos">{F.eur(totalAnualNeto)}</td></tr>
              <tr><td>Gastos anuales totales</td><td className="val-neg">−{F.eur(totalGastos*12)}</td></tr>
              <tr className="row-subtotal"><td>Superávit / Déficit anual</td><td className={F.valClass(superavitAnual)}>{F.eur(superavitAnual)}</td></tr>
              <tr className="row-total"><td>Tasa de ahorro</td><td className={tasaAhorro>=0.2?'val-pos':tasaAhorro>=0.1?'val-warn':'val-neg'}>{F.pct(tasaAhorro)}</td></tr>
            </tbody></table></div>
            <div className={`diag ${superavitMensual>=0?'diag-ok':'diag-bad'}`}>{superavitMensual>=0?`✓ Equilibrio positivo. Capacidad de ahorro mensual: ${F.eur(superavitMensual)}. Tasa de ahorro: ${F.pct(tasaAhorro)}.`:`⚠ Déficit mensual de ${F.eur(Math.abs(superavitMensual))}. Los gastos superan los ingresos netos.`}</div>
          </div>
        </div>
      </div>
    </div>
  );
};

const Stepper = ({ value, step, min=0, format, onChange }) => {
  const inc = () => onChange(Math.round((value + step) * 1e8) / 1e8);
  const dec = () => onChange(Math.max(min, Math.round((value - step) * 1e8) / 1e8));
  return (
    <div style={{display:'inline-flex',alignItems:'center',gap:2,border:'1px solid var(--border2)',borderRadius:5,overflow:'hidden',background:'white'}}>
      <button onClick={dec} style={{background:'none',border:'none',padding:'1px 5px',cursor:'pointer',color:'var(--muted)',fontSize:12,lineHeight:1,userSelect:'none'}}>▼</button>
      <span style={{padding:'1px 6px',fontSize:12,fontFamily:'DM Mono,monospace',minWidth:60,textAlign:'center',color:'var(--text)'}}>{format?format(value):value}</span>
      <button onClick={inc} style={{background:'none',border:'none',padding:'1px 5px',cursor:'pointer',color:'var(--navy)',fontSize:12,lineHeight:1,userSelect:'none'}}>▲</button>
    </div>
  );
};

const Sheet2 = ({ state, setState }) => {
  const { objetivos, gastos, ingresos } = state;
  const [editingObjetivos, setEditingObjetivos] = useState(false);
  const gastosFijos = gastos.filter(g=>g.tipo==='Fijo').reduce((a,g)=>a+g.mensual,0);
  const totalGastos = gastos.reduce((a,g)=>a+g.mensual,0);
  const totalMensualNeto = ingresos.reduce((a,i)=>a+i.mensualBruto*(1-i.tipoMarginal),0);
  const capacidadAhorro = totalMensualNeto - totalGastos;
  const updateObj = (idx,field,val) => setState(s=>{const obs=[...s.objetivos];obs[idx]={...obs[idx],[field]:['importeHoy','anosPlayzo','inflacion','rentabilidad','capitalInicial','aportacionActual'].includes(field)?(parseFloat(val)||0):val};return{...s,objetivos:obs}});
  const removeObj = (idx) => setState(s=>({...s,objetivos:s.objetivos.filter((_,i)=>i!==idx)}));
  const confirmObj = (idx) => setState(s=>({...s,objetivos:s.objetivos.map((o,i)=>i===idx?{...o,confirmed:true}:o)}));
  const addObj = () => setState(s=>({...s,objetivos:[...s.objetivos,{objetivo:'Nuevo objetivo',importeHoy:10000,anosPlayzo:5,inflacion:0.025,rentabilidad:0.04,capitalInicial:0,aportacionActual:0,prioridad:'Media',estado:'Pendiente',confirmed:false}]}));
  const computed = objetivos.map((o,idx)=>{
    let importeHoy=o.importeHoy;
    if(idx===0) importeHoy=gastosFijos*6;
    const anos=o.anosPlayzo||0,r=o.rentabilidad||0,inf=o.inflacion||0;
    const vf=importeHoy?importeHoy*Math.pow(1+inf,anos):null;
    const rMensual=r/12,nMeses=anos*12;
    const pmtSinCapital=vf&&nMeses>0?(rMensual===0?vf/nMeses:vf*rMensual/(Math.pow(1+rMensual,nMeses)-1)):null;
    const capitalUnico=vf&&anos>0?vf/Math.pow(1+r,anos):null;
    const capInicial=o.capitalInicial||0;
    const pmtConCapital=vf&&nMeses>0?Math.max(0,F.pmtFV(rMensual,nMeses,vf,capInicial)):null;
    const deficit=pmtConCapital!==null?pmtConCapital-(o.aportacionActual||0):null;
    return{vf,pmtSinCapital,capitalUnico,pmtConCapital,deficit,importeHoy};
  });
  const totalAportacionNecesaria=computed.reduce((a,c)=>a+(c.pmtConCapital||0),0);
  const margen=capacidadAhorro-totalAportacionNecesaria;
  return (
    <div className="page">
      <div className="page-title">OBJETIVOS FINANCIEROS — Planificación por Metas</div>
      <div className="kpi-grid kpi-grid-3" style={{marginBottom:20}}>
        <div className={`kpi ${margen>=0?'green':'red'}`}><div className="kpi-label">Margen / Déficit Mensual</div><div className={`kpi-value ${F.valClass(margen)}`}>{F.eur(margen)}</div><div className="kpi-sub">Capacidad ahorro − Aportaciones</div></div>
        <div className="kpi blue"><div className="kpi-label">Aportación Mensual Total Necesaria</div><div className="kpi-value val-neutral">{F.eur(totalAportacionNecesaria)}</div></div>
        <div className="kpi"><div className="kpi-label">Capacidad de Ahorro</div><div className="kpi-value val-neutral">{F.eur(capacidadAhorro)}</div></div>
      </div>
      {margen>=0?<div className="diag diag-ok" style={{marginBottom:16}}>✓ Tu capacidad de ahorro cubre todas las metas. Margen disponible: {F.eur(margen)}/mes.</div>:<div className="diag diag-bad" style={{marginBottom:16}}>⚠ Déficit de {F.eur(Math.abs(margen))}/mes. Revisa prioridades o ajusta importes y plazos.</div>}
      <div className="section"><div className="section-header">TABLA DE OBJETIVOS</div>
        <div className="table-scroll"><table>
          <thead><tr><th style={{textAlign:'left',width:160}}>Objetivo</th><th>Importe Hoy</th><th>Años</th><th>Inflación</th><th>VF</th><th>Rent.</th><th>PMT s/Cap</th><th>Cap.Único</th><th>Cap.Inicial</th><th>PMT c/Cap</th><th>Aport.Actual</th><th>Déficit</th><th>Prior.</th><th>Estado</th><th style={{width:70}}></th></tr></thead>
          <tbody>
            {objetivos.map((o,idx)=>{
              const c=computed[idx];
              return (<tr key={idx}>
                <td style={{fontWeight:600,background:o.confirmed?'':'#f0fdf4',color:'var(--navy)'}}>
                  {o.confirmed?<span>{o.objetivo}</span>:<input className="inp" type="text" value={o.objetivo} autoFocus onChange={e=>updateObj(idx,'objetivo',e.target.value)} style={{width:'100%',minWidth:140,textAlign:'left'}}/>}
                </td>
                <td>{idx===0?<span className="computed">{F.eur(c.importeHoy)}</span>:idx===4?<span className="nota">Ver Jub.</span>:o.confirmed?(editingObjetivos?<Stepper value={o.importeHoy||0} step={1000} format={v=>F.eur(v)} onChange={v=>updateObj(idx,'importeHoy',v)}/>:<span className="val-neutral">{F.eur(o.importeHoy)}</span>):<input className="inp" type="number" value={o.importeHoy||''} onChange={e=>updateObj(idx,'importeHoy',e.target.value)} style={{width:80}}/>}</td>
                <td>{idx===4?<span className="nota">—</span>:o.confirmed?(editingObjetivos?<Stepper value={o.anosPlayzo||0} step={1} min={1} format={v=>v+' a'} onChange={v=>updateObj(idx,'anosPlayzo',v)}/>:<span className="val-neutral">{o.anosPlayzo} a</span>):<input className="inp" type="number" value={o.anosPlayzo||''} onChange={e=>updateObj(idx,'anosPlayzo',e.target.value)} style={{width:55}}/>}</td>
                <td>{o.confirmed?(editingObjetivos?<Stepper value={o.inflacion} step={0.005} min={0} format={v=>F.pct(v)} onChange={v=>updateObj(idx,'inflacion',v)}/>:<span className="val-neutral">{F.pct(o.inflacion)}</span>):<input className="inp" type="number" step="0.005" value={o.inflacion} onChange={e=>updateObj(idx,'inflacion',e.target.value)} style={{width:55}}/>}</td>
                <td className="computed">{c.vf?F.eur(c.vf):'—'}</td>
                <td>{o.confirmed?(editingObjetivos?<Stepper value={o.rentabilidad} step={0.005} min={0} format={v=>F.pct(v)} onChange={v=>updateObj(idx,'rentabilidad',v)}/>:<span className="val-neutral">{F.pct(o.rentabilidad)}</span>):<input className="inp" type="number" step="0.005" value={o.rentabilidad} onChange={e=>updateObj(idx,'rentabilidad',e.target.value)} style={{width:55}}/>}</td>
                <td className="computed">{c.pmtSinCapital?F.eur(c.pmtSinCapital):'—'}</td>
                <td className="computed">{c.capitalUnico?F.eur(c.capitalUnico):'—'}</td>
                <td>{o.confirmed?(editingObjetivos?<Stepper value={o.capitalInicial||0} step={500} format={v=>F.eur(v)} onChange={v=>updateObj(idx,'capitalInicial',v)}/>:<span className="val-neutral">{F.eur(o.capitalInicial)}</span>):<input className="inp" type="number" value={o.capitalInicial||0} onChange={e=>updateObj(idx,'capitalInicial',e.target.value)} style={{width:70}}/>}</td>
                <td className="computed" style={{fontWeight:600}}>{c.pmtConCapital?F.eur(c.pmtConCapital):'—'}</td>
                <td>{o.confirmed?(editingObjetivos?<Stepper value={o.aportacionActual||0} step={50} format={v=>F.eur(v)} onChange={v=>updateObj(idx,'aportacionActual',v)}/>:<span className="val-neutral">{F.eur(o.aportacionActual)}</span>):<input className="inp" type="number" value={o.aportacionActual||0} onChange={e=>updateObj(idx,'aportacionActual',e.target.value)} style={{width:70}}/>}</td>
                <td className={c.deficit!==null?(c.deficit>0?'val-neg':'val-pos'):''}>{c.deficit!==null?F.eur(c.deficit>0?c.deficit:0):'—'}</td>
                <td>{o.confirmed?(editingObjetivos?<select className="inp" value={o.prioridad} onChange={e=>updateObj(idx,'prioridad',e.target.value)} style={{width:70}}><option>Alta</option><option>Media</option><option>Baja</option></select>:<span className={`badge badge-${o.prioridad.toLowerCase()}`}>{o.prioridad}</span>):<select className="inp" value={o.prioridad} onChange={e=>updateObj(idx,'prioridad',e.target.value)} style={{width:70}}><option>Alta</option><option>Media</option><option>Baja</option></select>}</td>

    else{const gastoAnio=gastoAnualVF*Math.pow(1+j.inflacion,edad-j.edadJubilacion);const pensionAnio=pensionAnualVF*Math.pow(1+j.inflacion,edad-j.edadJubilacion);flujo=-(gastoAnio-pensionAnio);capital=capital*(1+rent)+flujo;}
    rows.push({edad,anio,fase,aportacion:enJubilacion?flujo:aportActual,rent,capitalInicio,flujoNeto:flujo,capitalFin:Math.max(0,capital)});

const Sheet4 = ({ state, setState }) => {

  const addHipoteca=()=>setState(s=>{const hips=s.hipotecas?[...s.hipotecas]:[{...s.hip}];hips.push({capitalPendiente:0,tipoInteres:0.035,plazoRestante:20,valorTasacion:0,amortizacionAnticipada:0,tipoAmortizacion:'frances',nombre:`Hipoteca ${hips.length+1}`});setActiveHip(hips.length-1);return{...s,hipotecas:hips}});
  const removeHipoteca=(idx)=>{if(hipotecas.length<=1)return;setState(s=>{const hips=(s.hipotecas||[{...s.hip}]).filter((_,i)=>i!==idx);return{...s,hipotecas:hips}});setActiveHip(Math.max(0,idx-1))};
  const h=hipotecas[Math.min(activeHip,hipotecas.length-1)]||hipotecas[0];
  const hipIdx=Math.min(activeHip,hipotecas.length-1);
  const tipoAmort=h.tipoAmortizacion||'frances';
  const rMes=h.tipoInteres/12,nMeses=h.plazoRestante*12;
  const cuotaMensual=F.cuotaMensualByType(tipoAmort,h.capitalPendiente,h.tipoInteres,h.plazoRestante);

  const ltv=h.valorTasacion>0?h.capitalPendiente/h.valorTasacion:0;
  const totalCuotaMensual=hipotecas.reduce((a,hip)=>a+F.cuotaMensualByType(hip.tipoAmortizacion||'frances',hip.capitalPendiente,hip.tipoInteres,hip.plazoRestante),0);
  const dsr=totalMensualNeto>0?totalCuotaMensual/totalMensualNeto:0;
  const totalCapital=hipotecas.reduce((a,hip)=>a+hip.capitalPendiente,0);
  const totalTasacion=hipotecas.reduce((a,hip)=>a+hip.valorTasacion,0);
  const ltvTotal=totalTasacion>0?totalCapital/totalTasacion:0;
  // Shocks: use type-aware cuota; total intereses computed from schedule
  const shocks=[-100,-50,0,100,200,300].map(bp=>{
    const r=Math.max(0,h.tipoInteres+bp/10000);
    const cuota=F.cuotaMensualByType(tipoAmort,h.capitalPendiente,r,h.plazoRestante);
    const sched=F.amortScheduleByType(tipoAmort,h.capitalPendiente,r,h.plazoRestante);
    const totalIntereses=sched.reduce((a,row)=>a+row.intereses,0);
    return{bp,tipo:r,cuota,delta:cuota-cuotaMensual,totalIntereses};
  });
  const newCapital=Math.max(0,h.capitalPendiente-h.amortizacionAnticipada);
  // Opción 1: reducir cuota — recalc cuota with new capital, same plazo, same type
  const cuotaOpc1=F.cuotaMensualByType(tipoAmort,newCapital,h.tipoInteres,h.plazoRestante);
  // Opción 2: reducir plazo — only mathematically clean for Francés
  const nMesesOpc2=tipoAmort==='frances'&&rMes>0&&cuotaMensual>0&&newCapital>0?F.nper(rMes,cuotaMensual,newCapital):0;
  const anosAhorrados=tipoAmort==='frances'?h.plazoRestante-nMesesOpc2/12:0;
  const schedBase=F.amortScheduleByType(tipoAmort,h.capitalPendiente,h.tipoInteres,h.plazoRestante);
  const schedNueva=F.amortScheduleByType(tipoAmort,newCapital,h.tipoInteres,h.plazoRestante);
  const interesesBase=schedBase.reduce((a,r)=>a+r.intereses,0);
  const interesesNueva=schedNueva.reduce((a,r)=>a+r.intereses,0);
  const ahorroInteresesOpc1=interesesBase-interesesNueva;
  const ahorroTotalIntereses=tipoAmort==='frances'&&nMesesOpc2>0?cuotaMensual*nMeses-h.capitalPendiente-(cuotaMensual*nMesesOpc2-newCapital):0;
  const schedule=schedBase;

const Sheet5 = ({ state, setState }) => {
  const { gastos, ingresos, hip, jub, balance } = state;

  const set=(f,v)=>setState(s=>({...s,balance:{...s.balance,[f]:parseFloat(v)||0}}));
  const totalGastos=gastos.reduce((a,g)=>a+g.mensual,0);
  const totalAnualNeto=ingresos.reduce((a,i)=>a+i.mensualBruto*12*(1-i.tipoMarginal),0);
  const totalMensualNeto=totalAnualNeto/12;
  const ahorroAnual=totalAnualNeto-totalGastos*12;
  const ahorroMensual=ahorroAnual/12;
  const tasaAhorro=totalMensualNeto>0?ahorroMensual/totalMensualNeto:0;
  const totalCuotaMensual=hipotecas.reduce((a,h)=>{const r=h.tipoInteres/12;const n=h.plazoRestante*12;return a+(n>0&&h.capitalPendiente>0?F.pmt(r,n,h.capitalPendiente):0)},0);
  const totalCapitalHip=hipotecas.reduce((a,h)=>a+h.capitalPendiente,0);
  const totalTasacionHip=hipotecas.reduce((a,h)=>a+h.valorTasacion,0);
  const ltv=totalTasacionHip>0?totalCapitalHip/totalTasacionHip:0;
  const dsr=totalMensualNeto>0?totalCuotaMensual/totalMensualNeto:0;

  const gastoAnualVF=jub.gastoMensualHoy*12*Math.pow(1+jub.inflacion,anosHastaJub);

  const deficitAnualJub=Math.max(0,gastoAnualVF-pensionAnualVF);

  const capAcumulado=jub.capitalInicial*Math.pow(1+jub.rAcc,anosHastaJub)+fvAportaciones;
  const coberturaJub=capNecesario>0?capAcumulado/capNecesario:0;

  const activosLiquidos=balance.cuentaCorriente+balance.cuentaAhorro+state.fondoEmergencia;

  const IR=({label,field,step=100})=>(<tr><td>{label}</td><td><input className="inp" type="number" step={step} value={balance[field]} onChange={e=>set(field,e.target.value)} style={{width:100}}/></td></tr>);

        <div className="kpi blue"><div className="kpi-label">Patrimonio Neto</div><div className="kpi-value">{F.eur(patrimonioNeto)}</div><div className="kpi-sub">Activos − Pasivos</div></div>
        <div className={`kpi ${ltv<=0.8?'green':'amber'}`}><div className="kpi-label">LTV Hipoteca</div><div className="kpi-value">{F.pct(ltv)}</div><div className="kpi-sub">DSR: {F.pct(dsr)}</div></div>

          <div className="bar-chart">{[{lbl:'Alta',val:activosAlta,color:'var(--green)'},{lbl:'Media',val:activosMedia,color:'var(--amber)'},{lbl:'Nula',val:activosNula,color:'var(--muted)'}].map(b=>(<div className="bar-row" key={b.lbl}><div className="bar-lbl">{b.lbl}</div><div className="bar-track"><div className="bar-fill" style={{width:totalActivos>0?Math.min(100,b.val/totalActivos*100)+'%':'0%',background:b.color}}>{totalActivos>0&&b.val/totalActivos>0.05?F.pct(b.val/totalActivos):''}</div></div><div className="bar-val">{F.eur(b.val)}</div></div>))}</div>

            <tbody>
              {pasivos.map((p,i)=>(<tr key={i}><td style={{color:'var(--muted)',fontSize:11}}>{p.tipo}</td><td>{p.concepto}</td><td>{p.editable?<input className="inp" type="number" value={p.valor} onChange={e=>set(p.field,e.target.value)} style={{width:90}}/>:<span className="computed">{F.eur(p.valor)}</span>}</td><td className="val-neutral">{F.pct(p.tipo_int)}</td></tr>))}

            </tbody>
          </table></div></div>
          <div className="section"><div className="section-header">HISTÓRICO PATRIMONIO NETO</div><div className="table-scroll"><table>
            <thead><tr><th style={{textAlign:'left'}}>Año</th><th>Patrimonio Neto (€)</th><th>Variación</th></tr></thead>
            <tbody>{histYears.map((y,i)=>{
              const val=i<6?(historico[y]||0):(i===6?patrimonioNeto:null);
              const prev=i===0?null:(i<6?(historico[histYears[i-1]]||0):(i===6?(historico[2025]||0):null));
              const delta=val!==null&&prev!==null?val-prev:null;
              return(<tr key={y}><td>{y}{i>=6&&<span className="nota"> (proy.)</span>}</td>
                <td>{i<6?<input className="inp" type="number" value={historico[y]||''} onChange={e=>setHist(y,e.target.value)} style={{width:100}}/>:<span className="computed">{F.eur(val)}</span>}</td>
                <td className={delta!==null?(delta>=0?'val-pos':'val-neg'):''}>{delta!==null?(delta>=0?'+':'')+F.eur(delta):'—'}</td>
              </tr>);
            })}</tbody>
          </table></div></div>
        </div>
      </div>
    </div>
  );
};

const Sheet7 = ({ state, setState }) => {
  const { seguros, gastos, ingresos, hip, balance, fondoEmergencia } = state;
  const hipotecas = state.hipotecas || [hip];
  const hipotecaPendiente=hipotecas.reduce((a,h)=>a+h.capitalPendiente,0);
  const valorTasacionTotal=hipotecas.reduce((a,h)=>a+h.valorTasacion,0);
  const sg=seguros;
  const set=(f,v)=>setState(s=>({...s,seguros:{...s.seguros,[f]:typeof v==='boolean'?v:(parseFloat(v)||0)}}));
  const ingresosNetos=ingresos.reduce((a,i)=>a+i.mensualBruto*12*(1-i.tipoMarginal),0);
  const gastosFamiliares=gastos.reduce((a,g)=>a+g.mensual,0)*12;
  const patrimonioLiquido=balance.cuentaCorriente+balance.cuentaAhorro+fondoEmergencia+balance.carteraInversion;
  const edadAsegurado=sg.edadAsegurado||40;
  const deudas=hipotecaPendiente+sg.otrosPasivos;
  const gastosCubrirHijos=gastosFamiliares*sg.anosRestanteDependencia;
  const gastosEducacion=gastos.filter(g=>g.clase==='Educación').reduce((a,g)=>a+g.mensual*12*Math.min(sg.anosRestanteDependencia,4),0);
  const totalNecesidades=deudas+gastosCubrirHijos+gastosEducacion+sg.fondoFinal;
  const capitalRequeridoNecesidades=Math.max(0,totalNecesidades-patrimonioLiquido);
  const capitalRequeridoIngresos=F.pvAnnuity(sg.tasaDescuento,sg.anosIngresosReemplazar,ingresosNetos);
  const capitalRecomendado=Math.max(capitalRequeridoNecesidades,capitalRequeridoIngresos);
  const deficitVida=Math.max(0,capitalRecomendado-sg.capitalVidaContratado);
  const primaVidaEstimada=capitalRecomendado*0.001;
  const anosProteger=Math.max(0,67-edadAsegurado);
  const capitalInvalidez=F.pvAnnuity(sg.tasaDescuento,anosProteger,ingresosNetos);
  const deficitInvalidez=Math.max(0,capitalInvalidez-sg.capitalInvalidezContratado);
  const primaSaludTotal=sg.numAseguradosSalud*sg.primaMediaSalud;
  const valorContinente=valorTasacionTotal*0.6;
  const capitalHogar=sg.valorContenidoHogar+valorContinente;
  const primaHogar=capitalHogar*0.003;
  const primaInvalidez=capitalInvalidez*0.008;
  const totalAnualSeguros=primaVidaEstimada+primaInvalidez+primaSaludTotal+primaHogar;
  const pctIngresos=ingresosNetos>0?totalAnualSeguros/ingresosNetos:0;
  const IR=({label,field,step=1,unit='',boolean:isBool})=>(<tr><td>{label}</td><td>{isBool?<select className="inp" value={sg[field]?'Sí':'No'} onChange={e=>set(field,e.target.value==='Sí')} style={{width:70}}><option>Sí</option><option>No</option></select>:<><input className="inp" type="number" step={step} value={sg[field]} onChange={e=>set(field,e.target.value)} style={{width:100}}/>{unit&&<span style={{marginLeft:4,color:'var(--muted)',fontSize:11}}>{unit}</span>}</>}</td></tr>);
  return (
    <div className="page">
      <div className="page-title">SEGUROS — Cobertura Necesaria vs. Contratada</div>
      <div className="kpi-grid kpi-grid-4" style={{marginBottom:20}}>
        <div className={`kpi ${deficitVida<=0?'green':'red'}`}><div className="kpi-label">Déficit Seg. Vida</div><div className="kpi-value">{F.eur(deficitVida)}</div><div className="kpi-sub">Recomendado: {F.eur(capitalRecomendado)}</div></div>
        <div className={`kpi ${deficitInvalidez<=0?'green':'red'}`}><div className="kpi-label">Déficit Seg. Invalidez</div><div className="kpi-value">{F.eur(deficitInvalidez)}</div><div className="kpi-sub">Necesario: {F.eur(capitalInvalidez)}</div></div>
        <div className="kpi blue"><div className="kpi-label">Coste Total Anual</div><div className="kpi-value">{F.eur(totalAnualSeguros)}</div><div className="kpi-sub">{F.pct(pctIngresos)} de ingresos</div></div>
        <div className={`kpi ${pctIngresos<=0.05?'green':'amber'}`}><div className="kpi-label">% sobre Ingresos</div><div className="kpi-value">{F.pct(pctIngresos)}</div><div className="kpi-sub">Ref. saludable &lt; 5%</div></div>
      </div>
      <div className="two-col">
        <div>
          <div className="section"><div className="section-header">DATOS PERSONALES</div><table><tbody>
            <IR label="Edad asegurado" field="edadAsegurado" unit="años"/><IR label="Cónyuge depende económicamente" field="conyugeDepende" boolean/>
            <IR label="Nº hijos dependientes" field="numHijos"/><IR label="Años restantes dependencia" field="anosRestanteDependencia" unit="años"/>
            <tr><td>Ingresos netos anuales</td><td className="computed">{F.eur(ingresosNetos)}</td></tr>
            <tr><td>Gastos familiares anuales</td><td className="computed">{F.eur(gastosFamiliares)}</td></tr>
            <tr><td>Hipoteca pendiente</td><td className="computed">{F.eur(hipotecaPendiente)}</td></tr>
            <IR label="Otros pasivos (€)" field="otrosPasivos" step={1000}/>
          </tbody></table></div>
          <div className="section"><div className="section-header">SEGURO DE VIDA — Método Necesidades</div><table><tbody>
            <tr><td>Deudas a saldar</td><td className="val-neutral">{F.eur(deudas)}</td></tr>
            <tr><td>Gastos familiares hasta emancipación</td><td className="val-neutral">{F.eur(gastosCubrirHijos)}</td></tr>
            <tr><td>Gastos educación pendientes</td><td className="val-neutral">{F.eur(gastosEducacion)}</td></tr>
            <IR label="Fondo final (€)" field="fondoFinal" step={1000} unit="€"/>
            <tr className="row-subtotal"><td>TOTAL NECESIDADES</td><td className="val-neutral">{F.eur(totalNecesidades)}</td></tr>
            <tr><td>Menos: patrimonio líquido</td><td className="val-pos">−{F.eur(patrimonioLiquido)}</td></tr>
            <tr className="row-total"><td>Capital requerido</td><td className="val-neutral">{F.eur(capitalRequeridoNecesidades)}</td></tr>
          </tbody></table></div>
          <div className="section"><div className="section-header">SEGURO DE VIDA — Método Ingresos</div><table><tbody>
            <IR label="Años de ingresos a reemplazar" field="anosIngresosReemplazar" unit="años"/>
            <IR label="Tasa de descuento" field="tasaDescuento" step={0.005}/>
            <tr><td>Capital requerido (VP ingresos)</td><td className="val-neutral">{F.eur(capitalRequeridoIngresos)}</td></tr>
          </tbody></table></div>
          <div className="section"><div className="section-header">RESUMEN SEGURO DE VIDA</div><table><tbody>
            <tr><td>Capital recomendado</td><td className="val-neutral">{F.eur(capitalRecomendado)}</td></tr>
            <IR label="Capital vida contratado (€)" field="capitalVidaContratado" step={10000}/>
            <tr className="row-subtotal"><td>Déficit cobertura</td><td className={deficitVida>0?'val-neg':'val-pos'}>{F.eur(deficitVida)}</td></tr>
            <tr><td>Prima anual estimada</td><td className="val-neutral">{F.eur(primaVidaEstimada)}</td></tr>
          </tbody></table>
          {deficitVida>0?<div className="diag diag-bad">⚠ Déficit de cobertura de vida: {F.eur(deficitVida)}.</div>:<div className="diag diag-ok">✓ Cobertura de vida suficiente.</div>}
          </div>
        </div>
        <div>
          <div className="section"><div className="section-header">SEGURO DE INVALIDEZ</div><table><tbody>
            <tr><td>Ingresos a proteger al año</td><td className="val-neutral">{F.eur(ingresosNetos)}</td></tr>
            <tr><td>Años a proteger (hasta jub.)</td><td className="val-neutral">{anosProteger} años</td></tr>
            <tr><td>Capital recomendado</td><td className="val-neutral">{F.eur(capitalInvalidez)}</td></tr>
            <IR label="Capital contratado (€)" field="capitalInvalidezContratado" step={10000}/>
            <tr className="row-subtotal"><td>Déficit</td><td className={deficitInvalidez>0?'val-neg':'val-pos'}>{F.eur(deficitInvalidez)}</td></tr>
          </tbody></table>
          {deficitInvalidez>0?<div className="diag diag-bad">⚠ Déficit invalidez: {F.eur(deficitInvalidez)}.</div>:<div className="diag diag-ok">✓ Cobertura invalidez suficiente.</div>}
          </div>
          <div className="section"><div className="section-header">SEGURO DE SALUD</div><table><tbody>
            <IR label="Nº asegurados" field="numAseguradosSalud"/><IR label="Prima media por persona (€/año)" field="primaMediaSalud" step={50} unit="€"/>
            <tr><td>Prima total anual</td><td className="val-neutral">{F.eur(primaSaludTotal)}</td></tr>
            <tr><td>Prima mensual</td><td className="val-neutral">{F.eur(primaSaludTotal/12)}</td></tr>
          </tbody></table></div>
          <div className="section"><div className="section-header">SEGURO DE HOGAR</div><table><tbody>
            <IR label="Valor contenido (€)" field="valorContenidoHogar" step={5000} unit="€"/>
            <tr><td>Valor continente (60% tasación)</td><td className="computed">{F.eur(valorContinente)}</td></tr>
            <tr><td>Capital asegurado recomendado</td><td className="val-neutral">{F.eur(capitalHogar)}</td></tr>
            <tr><td>Prima anual estimada (0,3%)</td><td className="val-neutral">{F.eur(primaHogar)}</td></tr>
          </tbody></table></div>
          <div className="section"><div className="section-header">RESUMEN COSTES ANUALES</div><table><tbody>
            <tr><td>Vida</td><td className="val-neutral">{F.eur(primaVidaEstimada)}</td></tr>
            <tr><td>Invalidez</td><td className="val-neutral">{F.eur(primaInvalidez)}</td></tr>
            <tr><td>Salud</td><td className="val-neutral">{F.eur(primaSaludTotal)}</td></tr>
            <tr><td>Hogar</td><td className="val-neutral">{F.eur(primaHogar)}</td></tr>
            <tr className="row-total"><td>TOTAL ANUAL</td><td className="val-neutral">{F.eur(totalAnualSeguros)}</td></tr>
            <tr><td>% sobre ingresos netos</td><td className={pctIngresos<=0.05?'val-pos':'val-warn'}>{F.pct(pctIngresos)}</td></tr>
          </tbody></table>
          <div className={`diag ${pctIngresos<=0.05?'diag-ok':'diag-warn'}`}>{pctIngresos<=0.05?`✓ Coste total de seguros saludable: ${F.pct(pctIngresos)}.`:`⚠ Coste elevado: ${F.pct(pctIngresos)}. Revisa coberturas.`}</div>
          </div>
        </div>
      </div>
    </div>
  );
};

const Sheet8 = ({ state, setState }) => {
  const { invalidez, ingresos, gastos, balance, fondoEmergencia } = state;
  const inv=invalidez;
  const set=(f,v)=>setState(s=>({...s,invalidez:{...s.invalidez,[f]:['gradoInvalidez'].includes(f)?v:(parseFloat(v)||0)}}));
  const salarioPrincipal=ingresos[0]?.mensualBruto||0;
  const salarioConyugue=ingresos[1]?.mensualBruto||0;
  const pagasExtra=ingresos[2]?.mensualBruto||0;
  const dividendos=ingresos[3]?.mensualBruto||0;
  const rentasAlquiler=ingresos[4]?.mensualBruto||0;
  const pensionJubPublica=ingresos[5]?.mensualBruto||0;
  const salarioAfectado=inv.titularAfectado==1?salarioPrincipal:salarioConyugue;
  const salarioOtro=inv.titularAfectado==1?salarioConyugue:salarioPrincipal;
  const gradoInfo={'IPP':{pct:0,label:'IPP — Parcial',compatible:'Mantiene profesión habitual'},'IPT':{pct:0.55,label:'IPT — Total',compatible:'Impide profesión habitual'},'IPA':{pct:1.0,label:'IPA — Absoluta',compatible:'Inhabilita toda profesión'},'GI':{pct:1.5,label:'GI — Gran Invalidez',compatible:'Necesita tercera persona'}};
  const grado=gradoInfo[inv.gradoInvalidez]||gradoInfo['IPT'];
  const pensionIncapacidad=inv.gradoInvalidez==='IPP'?0:salarioAfectado*grado.pct;
  const pagaUnicaIPP=inv.gradoInvalidez==='IPP'?salarioAfectado*inv.pagaUnicaIPP:0;
  const baselineIngresos=[
    {concepto:'Salario titular afectado',baseline:salarioAfectado,escenario:salarioAfectado*inv.pctSalarioConservado},
    {concepto:'Salario otro titular',baseline:salarioOtro,escenario:salarioOtro},
    {concepto:'Pagas extra / variable',baseline:pagasExtra,escenario:pagasExtra*(1-inv.pctPagasExtra)},
    {concepto:'Dividendos cartera',baseline:dividendos,escenario:dividendos},
    {concepto:'Rentas alquiler',baseline:rentasAlquiler,escenario:rentasAlquiler},
    {concepto:'Pensión pública jubilación',baseline:pensionJubPublica,escenario:pensionJubPublica},
    {concepto:'Pensión pública por incapacidad',baseline:0,escenario:pensionIncapacidad},
    {concepto:'Seguro privado — renta mensual',baseline:0,escenario:inv.seguroPrivadoRenta},
  ];
  const totalIngBaseline=baselineIngresos.reduce((a,x)=>a+x.baseline,0);
  const totalIngEscenario=baselineIngresos.reduce((a,x)=>a+x.escenario,0);
  const totalGastosMensual=gastos.reduce((a,g)=>a+g.mensual,0);
  const adaptacionMensual=inv.duracionEscenario>0?inv.adaptacionVivienda/(inv.duracionEscenario*12):0;
  const baselineGastos=[
    {concepto:'Gastos corrientes',baseline:totalGastosMensual,escenario:totalGastosMensual-inv.ahorroGastosLaborales},
    {concepto:'Gasto médico adicional',baseline:0,escenario:inv.deltaGastoMedico},
    {concepto:'Cuidador / asistencia',baseline:0,escenario:inv.deltaGastoCuidador},
    {concepto:'Adaptación vivienda (amort.)',baseline:0,escenario:adaptacionMensual},
  ];
  const totalGasBaseline=baselineGastos.reduce((a,x)=>a+x.baseline,0);
  const totalGasEscenario=baselineGastos.reduce((a,x)=>a+x.escenario,0);
  const ahorroNetoBaseline=totalIngBaseline-totalGasBaseline;
  const ahorroNetoEscenario=totalIngEscenario-totalGasEscenario;
  const deltaMensual=ahorroNetoEscenario-ahorroNetoBaseline;
  const deltaAnual=deltaMensual*12;
  const vpPerdida=F.pvAnnuity(inv.tasaDescuento,inv.duracionEscenario,Math.abs(Math.min(0,deltaMensual)*12));
  const patrimonioLiquido=balance.cuentaCorriente+balance.cuentaAhorro+fondoEmergencia+balance.carteraInversion;
  const anosAgotando=deltaMensual<0&&patrimonioLiquido>0?patrimonioLiquido/Math.abs(deltaMensual*12):null;
  const sensibilidad=['IPP','IPT','IPT75','IPA','GI'].map(g=>{
    const pcts={'IPP':0,'IPT':0.55,'IPT75':0.75,'IPA':1.0,'GI':1.5};
    const labels={'IPP':'IPP — Parcial','IPT':'IPT — Total 55%','IPT75':'IPT — Total 75%','IPA':'IPA — Absoluta 100%','GI':'GI — Gran Invalidez 150%'};
    const pensionG=pcts[g]===0?0:salarioAfectado*pcts[g];
    const ingTotal=totalIngEscenario-pensionIncapacidad+pensionG;
    const ahorroNeto=ingTotal-totalGasEscenario;
    const delta=ahorroNeto-ahorroNetoBaseline;
    const vp=F.pvAnnuity(inv.tasaDescuento,inv.duracionEscenario,Math.abs(Math.min(0,delta)*12));
    return{grado:labels[g],pension:pensionG,ingTotal,ahorroNeto,delta,vp};
  });
  const projRows=[];let pat=patrimonioLiquido;
  for(let i=0;i<Math.min(inv.horizonteAnalisis,30);i++){const anio=2026+i;const enEscenario=i>=inv.anosDesdeHoy&&i<inv.anosDesdeHoy+inv.duracionEscenario;const flujoAnual=enEscenario?deltaMensual*12:0;pat=pat+flujoAnual;projRows.push({anio,enEscenario,flujoAnual,patrimonioLiquido:Math.max(0,pat)})}
  return (
    <div className="page">
      <div className="page-title">⚠ ANÁLISIS DE RIESGO — INCAPACIDAD LABORAL <span style={{fontSize:12,fontWeight:400,color:'var(--muted)'}}>(Marco SS España)</span></div>
      <div className="diag diag-info" style={{marginBottom:16}}>Impacto de invalidez sobre ingresos, gastos, ahorro y patrimonio. Grados INSS: IPP · IPT · IPA · GI.</div>
      <div className="two-col">
        <div>
          <div className="section"><div className="section-header">1 · SUPUESTOS DEL ESCENARIO</div><table>
            <thead><tr><th style={{textAlign:'left'}}>Parámetro</th><th style={{textAlign:'left'}}>Valor</th><th style={{textAlign:'left'}}>Nota</th></tr></thead>
            <tbody>
              <tr><td>Titular afectado</td><td><select className="inp" value={inv.titularAfectado} onChange={e=>set('titularAfectado',e.target.value)} style={{width:60}}><option value={1}>1 — Principal</option><option value={2}>2 — Cónyuge</option></select></td><td className="nota">Salario del titular</td></tr>
              <tr><td>Grado de invalidez</td><td><select className="inp" value={inv.gradoInvalidez} onChange={e=>set('gradoInvalidez',e.target.value)} style={{width:90}}><option>IPP</option><option>IPT</option><option>IPA</option><option>GI</option></select></td><td className="nota">IPP · IPT · IPA · GI</td></tr>
              <tr><td>Años desde hoy</td><td><input className="inp" type="number" value={inv.anosDesdeHoy} onChange={e=>set('anosDesdeHoy',e.target.value)} style={{width:60}}/></td><td className="nota">0 = este año</td></tr>
              <tr><td>Duración escenario (años)</td><td><input className="inp" type="number" value={inv.duracionEscenario} onChange={e=>set('duracionEscenario',e.target.value)} style={{width:60}}/></td><td className="nota">Hasta recuperación</td></tr>
              <tr><td>Base reguladora mensual</td><td className="computed">{F.eur(salarioAfectado)}/mes</td><td className="nota">Salario titular</td></tr>
              <tr><td>% pensión pública</td><td className="computed">{F.pct(grado.pct)}</td><td className="nota">{grado.compatible}</td></tr>
              {inv.gradoInvalidez==='IPP'&&<tr><td>Paga única IPP (mensualidades)</td><td><input className="inp" type="number" value={inv.pagaUnicaIPP} onChange={e=>set('pagaUnicaIPP',e.target.value)} style={{width:60}}/></td><td className="nota">Solo IPP</td></tr>}
              <tr><td>% salario conservado</td><td><input className="inp" type="number" step={0.1} value={inv.pctSalarioConservado} onChange={e=>set('pctSalarioConservado',e.target.value)} style={{width:60}}/></td><td className="nota">IPT: otra profesión</td></tr>

          </tbody></table>
          {deltaMensual<0?<div className="diag diag-bad">⚠ Déficit mensual de {F.eur(Math.abs(deltaMensual))}. VP pérdida: {F.eur(vpPerdida)}.</div>:<div className="diag diag-ok">✓ En este escenario los ingresos cubren los gastos.</div>}

          <div className="section"><div className="section-header">6 · SENSIBILIDAD POR GRADO</div><div className="table-scroll"><table>

          </table></div></div>
        </div>
      </div>
      <div className="section"><div className="section-header">7 · PROYECCIÓN AÑO A AÑO</div>
        <div className="table-scroll" style={{maxHeight:320,overflow:'auto'}}><table>
          <thead><tr><th>Año</th><th>Fase</th><th>Flujo Anual</th><th>Patrimonio Líquido</th></tr></thead>
          <tbody>{projRows.map(r=>(<tr key={r.anio} className={r.enEscenario?'highlight':''}><td>{r.anio}</td><td><span className={`badge ${r.enEscenario?'badge-alta':'badge-ok'}`}>{r.enEscenario?'Invalidez':'Normal'}</span></td><td className={F.valClass(r.flujoAnual)}>{r.enEscenario?F.eur(r.flujoAnual):'—'}</td><td className={r.patrimonioLiquido<=0?'val-neg':'val-neutral'}>{F.eur(r.patrimonioLiquido)}</td></tr>))}</tbody>
        </table></div>
      </div>
    </div>
  );
};

// ===== ADVISOR HOME (cuando se abre sin token) =====
const AdvisorHome = ({ onUseDemo }) => {
  const [clients, setClients] = useState(()=>CLIENT.getClientList());
  const [showNew, setShowNew] = useState(false);
  const [newName, setNewName] = useState('');
  const [creating, setCreating] = useState(false);
  const [filter, setFilter] = useState('all'); // 'all' | 'active' | 'completed'
  const [copiedField, setCopiedField] = useState(null); // {token, field}

  const createClient = async () => {
    const name = newName.trim();
    if (!name) return;
    setCreating(true);
    const token = CLIENT.generateToken();
    const pin = CLIENT.generatePin();
    const pinHash = await CLIENT.hashPin(pin);
    const link = CLIENT.buildLink(token, name, pinHash);
    const entry = { token, name, link, pin, pinHash, createdAt: Date.now(), status: 'active' };
    const next = [entry, ...clients];
    setClients(next);
    CLIENT.saveClientList(next);
    setNewName(''); setShowNew(false); setCreating(false);
    // Auto-copy link
    try { await navigator.clipboard.writeText(link); setCopiedField({token, field:'link'}); setTimeout(()=>setCopiedField(null), 2500); } catch {}
  };

  const regenerate = async (token) => {
    if (!confirm('¿Renovar el link y PIN de este cliente?\n\nEl link y PIN actuales dejarán de funcionar. El cliente perderá los datos que ya hubiera introducido.')) return;
    const client = clients.find(c=>c.token===token);
    if (!client) return;
    const newToken = CLIENT.generateToken();
    const newPin = CLIENT.generatePin();
    const newPinHash = await CLIENT.hashPin(newPin);
    const newLink = CLIENT.buildLink(newToken, client.name, newPinHash);
    const next = clients.map(c => c.token===token
      ? {...c, token:newToken, pin:newPin, pinHash:newPinHash, link:newLink, status:'active', regeneratedAt:Date.now()}
      : c);
    setClients(next);
    CLIENT.saveClientList(next);
    try { localStorage.removeItem(`pf_state_${token}`); } catch {}
  };

  const markCompleted = (token) => {
    const next = clients.map(c => c.token===token ? {...c, status: c.status==='completed'?'active':'completed'} : c);
    setClients(next);
    CLIENT.saveClientList(next);
  };

  const removeClient = (token) => {
    if (!confirm('¿Eliminar este cliente de tu lista? El link dejará de funcionar.')) return;
    const next = clients.filter(c=>c.token!==token);
    setClients(next);
    CLIENT.saveClientList(next);
    try { localStorage.removeItem(`pf_state_${token}`); } catch {}
    try { localStorage.removeItem(`pf_unlocked_${token}`); } catch {}
    try { localStorage.removeItem(`pf_attempts_${token}`); } catch {}
  };

  const copyText = async (text, token, field) => {
    try { await navigator.clipboard.writeText(text); setCopiedField({token, field}); setTimeout(()=>setCopiedField(null), 2000); }
    catch { alert('No se pudo copiar. Selecciónalo manualmente:\n\n' + text); }
  };

  const visibleClients = clients.filter(c => filter==='all' ? true : (c.status||'active')===filter);
  const counts = {
    all: clients.length,
    active: clients.filter(c => (c.status||'active')==='active').length,
    completed: clients.filter(c => c.status==='completed').length,
  };

  return (
    <div className="auth-wrap">
      <div className="auth-card" style={{maxWidth:680}}>
        <div className="auth-logo">💼 Plan<span>Financiero</span></div>
        <div className="auth-sub">Panel del asesor — gestión de clientes</div>

        <div style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:8,padding:'12px 14px',fontSize:12,color:'var(--text)',lineHeight:1.55,marginBottom:18}}>
          <strong>¿Cómo funciona?</strong><br/>
          1. Crea un cliente nuevo. Se genera un <strong>link único</strong> + un <strong>PIN de 4 dígitos</strong>.<br/>
          2. Envía el link por un canal (email) y el PIN por otro (WhatsApp, SMS, llamada).<br/>
          3. El cliente abre el link, introduce el PIN, rellena su plan, y pulsa "Enviar a mi asesor".<br/>
          4. Recibes el resumen completo en {ADVISOR_EMAIL}.
        </div>

        {!showNew ? (
          <button className="auth-btn primary" onClick={()=>setShowNew(true)}>+ Crear nuevo cliente</button>
        ) : (
          <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:8,padding:14,marginBottom:14}}>
            <div className="auth-label">Nombre del cliente</div>
            <input className="auth-input" type="text" autoFocus value={newName} onChange={e=>setNewName(e.target.value)}
              placeholder="Ej. Juan García" onKeyDown={e=>e.key==='Enter'&&!creating&&createClient()}/>
            <div style={{display:'flex',gap:8,marginTop:10}}>
              <button className="modal-btn" onClick={()=>{setShowNew(false);setNewName('')}} style={{flex:1}} disabled={creating}>Cancelar</button>
              <button className="modal-btn success" onClick={createClient} style={{flex:2}} disabled={creating}>{creating?'⏳ Generando...':'Generar link + PIN'}</button>
            </div>
          </div>

// ===== PIN GATE (cliente debe introducir PIN antes de acceder) =====
const PinGate = ({ token, name, expectedHash, onUnlock }) => {
  const [pin, setPin] = useState('');
  const [error, setError] = useState('');
  const [checking, setChecking] = useState(false);
  const [now, setNow] = useState(Date.now());

  useEffect(()=>{ const t = setInterval(()=>setNow(Date.now()), 1000); return ()=>clearInterval(t); }, []);

  const attempts = CLIENT.getAttempts(token);
  const recentFails = attempts.filter(t => now - t < 5*60_000);
  const isLocked = recentFails.length >= 5;
  const lockoutEnd = isLocked ? Math.max(...recentFails) + 5*60_000 : 0;
  const secsLeft = isLocked ? Math.max(0, Math.ceil((lockoutEnd - now)/1000)) : 0;

  const submit = async () => {
    setError('');
    if (isLocked && secsLeft > 0) return;
    if (!/^\d{4}$/.test(pin)) { setError('Introduce los 4 dígitos del PIN.'); return; }
    setChecking(true);
    const enteredHash = await CLIENT.hashPin(pin);
    setChecking(false);
    if (enteredHash === expectedHash) {
      CLIENT.setUnlocked(token);
      onUnlock();
    } else {
      CLIENT.addAttempt(token);
      setNow(Date.now());
      setPin('');
      const remaining = 5 - (recentFails.length + 1);
      setError(remaining > 0 ? `PIN incorrecto. Te quedan ${remaining} intento${remaining===1?'':'s'}.` : 'Demasiados intentos. Espera 5 minutos.');
    }
  };

  return (
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logo">💼 Plan<span>Financiero</span></div>
        <div className="auth-sub">Acceso seguro — sesión de <strong style={{color:'var(--navy)'}}>{name}</strong></div>

        <div style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:8,padding:'12px 14px',fontSize:12,color:'var(--text)',lineHeight:1.55,marginBottom:18}}>
          🔒 Para acceder a tu plan financiero, introduce el <strong>PIN de 4 dígitos</strong> que tu asesor te ha enviado por separado (WhatsApp, SMS, llamada...).
        </div>

        {error && <div className="auth-error">{error}</div>}
        {isLocked && secsLeft > 0 && <div className="auth-error">🔒 Bloqueado por seguridad. Intenta de nuevo en {Math.floor(secsLeft/60)}:{String(secsLeft%60).padStart(2,'0')}.</div>}

        <div className="auth-field">
          <label className="auth-label">PIN</label>
          <input className="auth-input" type="text" inputMode="numeric" pattern="[0-9]*" maxLength={4}
            value={pin} autoFocus disabled={isLocked&&secsLeft>0}
            onChange={e=>setPin(e.target.value.replace(/\D/g,'').slice(0,4))}
            onKeyDown={e=>e.key==='Enter'&&!checking&&submit()}
            style={{textAlign:'center',fontSize:24,letterSpacing:8,fontWeight:700,padding:'12px'}}
            placeholder="••••"/>
        </div>

        <button className="auth-btn primary" onClick={submit} disabled={checking||(isLocked&&secsLeft>0)}>
          {checking ? '⏳ Verificando...' : 'Acceder'}
        </button>

        <div className="auth-disclaimer">
          ⚠ Si has recibido este link por error o no recuerdas haber solicitado un plan financiero, ciérralo y avisa a la persona que te lo envió.
        </div>
      </div>
    </div>
  );
};
