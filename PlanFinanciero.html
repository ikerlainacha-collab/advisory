 │  ACTIVOS:                                                      │
 │    Activos líquidos:               ${pad(fmt(activosLiquidos), 15, 'right')}         │
 │    Cartera inversión:              ${pad(fmt(balance.carteraInversion), 15, 'right')}         │
 │    Plan pensiones:                 ${pad(fmt(balance.planPensiones), 15, 'right')}         │
 │    Vivienda(s):                    ${pad(fmt(totalTasacionHip), 15, 'right')}         │
 │    Otros activos:                  ${pad(fmt(balance.otrosInmuebles + balance.otrosActivos), 15, 'right')}         │
 │    ──────────────────────────────────────────────────────────  │
 │    TOTAL ACTIVOS:                  ${pad(fmt(totalActivos), 15, 'right')}         │
 │                                                                │
 │  PASIVOS:                                                      │
 │    Hipoteca(s):                    ${pad(fmt(totalCapitalHip), 15, 'right')}         │
 │    Otros pasivos:                  ${pad(fmt(totalPasivos - totalCapitalHip), 15, 'right')}         │
 │    ──────────────────────────────────────────────────────────  │
 │    TOTAL PASIVOS:                  ${pad(fmt(totalPasivos), 15, 'right')}         │
 │                                                                │
 │  PATRIMONIO NETO:                  ${pad(fmt(patrimonioNeto), 15, 'right')}         │
 └────────────────────────────────────────────────────────────────┘`;

  // ========== HOJA 6: BALANCE PATRIMONIAL DETALLADO ==========
  const activosAlta = activosLiquidos + (balanceDetalle.accionesCotizadas||0) + (balanceDetalle.fondosIndexados||0);
  const activosMedia = (balanceDetalle.depositos||0) + (balanceDetalle.bonosLetras||0) + (balanceDetalle.fondosMixtos||0);
  const activosNula = balance.planPensiones + totalTasacionHip + balance.otrosInmuebles + (balanceDetalle.participacionesEmpresa||0) + (balanceDetalle.alternativosArte||0);
  const pctLiquido = totalActivos > 0 ? activosAlta / totalActivos : 0;

  const hoja6 = `
┌${line('─',78)}┐
│${pad('🏛️ HOJA 6: BALANCE PATRIMONIAL DETALLADO', 78, 'center')}│
└${line('─',78)}┘

 ╔═══════════════════════════════════════════════════════════════════════════╗
 ║  ANÁLISIS DE LIQUIDEZ                                                     ║
 ╠═══════════════════════════════════════════════════════════════════════════╣
 ║  📊 % Activos Líquidos:            ${pad(pct(pctLiquido), 15, 'right')}                    ║
 ║  🏛️ Total Activos:                 ${pad(fmt(totalActivos), 15, 'right')}                    ║
 ║  🔴 Total Pasivos:                 ${pad(fmt(totalPasivos), 15, 'right')}                    ║
 ║  💰 Patrimonio Neto:               ${pad(fmt(patrimonioNeto), 15, 'right')}                    ║
 ╚═══════════════════════════════════════════════════════════════════════════╝

 ACTIVOS POR LIQUIDEZ:
 ┌────────────────────────────────────────────────────────────────┐
 │  ALTA (disponible T+0/T+2):                                   │
 │    Cuentas corrientes/ahorro:      ${pad(fmt(balance.cuentaCorriente + balance.cuentaAhorro), 15, 'right')}         │
 │    Fondo emergencia:               ${pad(fmt(fondoEmergencia), 15, 'right')}         │
 │    Acciones cotizadas:             ${pad(fmt(balanceDetalle.accionesCotizadas||0), 15, 'right')}         │
 │    Fondos indexados:               ${pad(fmt(balanceDetalle.fondosIndexados||0), 15, 'right')}         │
 │    Subtotal ALTA:                  ${pad(fmt(activosAlta), 15, 'right')}         │
 │                                                                │
 │  MEDIA (semanas/meses):                                        │
 │    Depósitos:                      ${pad(fmt(balanceDetalle.depositos||0), 15, 'right')}         │
 │    Bonos/letras:                   ${pad(fmt(balanceDetalle.bonosLetras||0), 15, 'right')}         │
 │    Fondos mixtos:                  ${pad(fmt(balanceDetalle.fondosMixtos||0), 15, 'right')}         │
 │    Subtotal MEDIA:                 ${pad(fmt(activosMedia), 15, 'right')}         │
 │                                                                │
 │  NULA (años o nunca):                                          │
 │    Plan pensiones:                 ${pad(fmt(balance.planPensiones), 15, 'right')}         │
 │    Inmuebles:                      ${pad(fmt(totalTasacionHip + balance.otrosInmuebles), 15, 'right')}         │
 │    Participaciones empresa:        ${pad(fmt(balanceDetalle.participacionesEmpresa||0), 15, 'right')}         │
 │    Subtotal NULA:                  ${pad(fmt(activosNula), 15, 'right')}         │
 └────────────────────────────────────────────────────────────────┘`;

  // ========== HOJA 7: SEGUROS ==========
  const salarioPrincipal = ingresos[0]?.mensualBruto || 0;
  const capitalRequeridoVida = (totalCapitalHip + seguros.otrosPasivos + totalGastos*12*seguros.anosRestanteDependencia + seguros.fondoFinal) - (balance.cuentaCorriente + balance.cuentaAhorro + fondoEmergencia + balance.carteraInversion);
  const capitalRequeridoInvalidez = F.pvAnnuity(seguros.tasaDescuento, Math.max(0, 67-seguros.edadAsegurado), totalIngNeto*12);
  const deficitVida = Math.max(0, Math.max(capitalRequeridoVida, F.pvAnnuity(seguros.tasaDescuento, seguros.anosIngresosReemplazar, totalIngNeto*12)) - seguros.capitalVidaContratado);
  const deficitInvalidez = Math.max(0, capitalRequeridoInvalidez - seguros.capitalInvalidezContratado);

  const hoja7 = `
┌${line('─',78)}┐
│${pad('🛡️ HOJA 7: ANÁLISIS DE SEGUROS', 78, 'center')}│
└${line('─',78)}┘

 ╔═══════════════════════════════════════════════════════════════════════════╗
 ║  DÉFICITS DE COBERTURA                                                    ║
 ╠═══════════════════════════════════════════════════════════════════════════╣
 ║  💀 Déficit Seguro Vida:          ${pad(fmt(deficitVida), 15, 'right')}                    ║
 ║  ♿ Déficit Seguro Invalidez:      ${pad(fmt(deficitInvalidez), 15, 'right')}                    ║
 ║  👨‍👩‍👧‍👦 Coste Total Anual (est.):      ${pad(fmt((deficitVida + deficitInvalidez)*0.01 + seguros.numAseguradosSalud*seguros.primaMediaSalud), 15, 'right')}                    ║
 ╚═══════════════════════════════════════════════════════════════════════════╝

 DATOS FAMILIARES:
 ┌────────────────────────────────────────────────────────────────┐
 │  Edad asegurado:                   ${pad(seguros.edadAsegurado+' años', 15, 'right')}         │
 │  Nº hijos dependientes:            ${pad(seguros.numHijos.toString(), 15, 'right')}         │
 │  Años restantes dependencia:       ${pad(seguros.anosRestanteDependencia+' años', 15, 'right')}         │
 │  Ingresos netos anuales:           ${pad(fmt(totalIngNeto*12), 15, 'right')}         │
 └────────────────────────────────────────────────────────────────┘

 COBERTURAS ACTUALES vs RECOMENDADAS:
 ┌────────────────────────────────────────────────────────────────┐
 │  VIDA:                                                         │
 │    Capital contratado:             ${pad(fmt(seguros.capitalVidaContratado), 15, 'right')}         │
 │    Capital recomendado:            ${pad(fmt(Math.max(capitalRequeridoVida, F.pvAnnuity(seguros.tasaDescuento, seguros.anosIngresosReemplazar, totalIngNeto*12))), 15, 'right')}         │
 │    Déficit:                        ${pad(fmt(deficitVida), 15, 'right')}         │
 │                                                                │
 │  INVALIDEZ:                                                    │
 │    Capital contratado:             ${pad(fmt(seguros.capitalInvalidezContratado), 15, 'right')}         │
 │    Capital recomendado:            ${pad(fmt(capitalRequeridoInvalidez), 15, 'right')}         │
 │    Déficit:                        ${pad(fmt(deficitInvalidez), 15, 'right')}         │
 │                                                                │
 │  SALUD:                                                        │
 │    Nº asegurados:                  ${pad(seguros.numAseguradosSalud.toString(), 15, 'right')}         │
 │    Prima anual total:              ${pad(fmt(seguros.numAseguradosSalud*seguros.primaMediaSalud), 15, 'right')}         │
 └────────────────────────────────────────────────────────────────┘`;

  // ========== HOJA 8: RIESGO INVALIDEZ ==========
  const salarioAfectado = invalidez.titularAfectado === 1 ? salarioPrincipal : (ingresos[1]?.mensualBruto || 0);
  const gradosInfo = {'IPP': 0, 'IPT': 0.55, 'IPA': 1.0, 'GI': 1.5};
  const pensionIncapacidad = invalidez.gradoInvalidez === 'IPP' ? 0 : salarioAfectado * (gradosInfo[invalidez.gradoInvalidez] || 0.55);
  const ingresosEscenario = totalIngNeto + pensionIncapacidad + invalidez.seguroPrivadoRenta - totalGastos + invalidez.ahorroGastosLaborales;
  const gastosSobrecostes = invalidez.deltaGastoMedico + invalidez.deltaGastoCuidador;
  const flujoMensualNeto = ingresosEscenario - gastosSobrecostes;
  const impactoAnual = flujoMensualNeto * 12;
  const vpPerdida = impactoAnual < 0 ? F.pvAnnuity(invalidez.tasaDescuento, invalidez.duracionEscenario, Math.abs(impactoAnual)) : 0;

  const hoja8 = `
┌${line('─',78)}┐
│${pad('⚠️ HOJA 8: ANÁLISIS DE RIESGO — INCAPACIDAD LABORAL', 78, 'center')}│
└${line('─',78)}┘

 ╔═══════════════════════════════════════════════════════════════════════════╗
 ║  IMPACTO FINANCIERO                                                       ║
 ╠═══════════════════════════════════════════════════════════════════════════╣
 ║  ⚡ Flujo Mensual Neto:           ${pad(fmt(flujoMensualNeto), 15, 'right')}                    ║
 ║  📅 Impacto Anual:                ${pad(fmt(impactoAnual), 15, 'right')}                    ║
 ║  💰 VP Pérdida Económica Total:   ${pad(fmt(vpPerdida), 15, 'right')}                    ║
 ╚═══════════════════════════════════════════════════════════════════════════╝

 ESCENARIO SIMULADO:
 ┌────────────────────────────────────────────────────────────────┐
 │  Titular afectado:                 ${pad(invalidez.titularAfectado === 1 ? 'Principal' : 'Cónyuge', 15, 'right')}         │
 │  Grado invalidez:                  ${pad(invalidez.gradoInvalidez, 15, 'right')}         │
 │  Salario base afectado:            ${pad(fmt(salarioAfectado), 15, 'right')}         │
 │  Pensión INSS (mensual):           ${pad(fmt(pensionIncapacidad), 15, 'right')}         │
 │  Duración escenario:               ${pad(invalidez.duracionEscenario+' años', 15, 'right')}         │
 │  Años desde hoy:                   ${pad(invalidez.anosDesdeHoy+' años', 15, 'right')}         │
 └────────────────────────────────────────────────────────────────┘

 AJUSTES DE INGRESOS Y GASTOS:
 ┌────────────────────────────────────────────────────────────────┐
 │  Ahorro gastos laborales:          ${pad(fmt(invalidez.ahorroGastosLaborales), 15, 'right')}         │
 │  Δ Gastos médicos:                 ${pad(fmt(invalidez.deltaGastoMedico), 15, 'right')}         │
 │  Δ Gastos cuidador:                ${pad(fmt(invalidez.deltaGastoCuidador), 15, 'right')}         │
 │  Seguro privado renta:             ${pad(fmt(invalidez.seguroPrivadoRenta), 15, 'right')}         │
 │  Adaptación vivienda (total):      ${pad(fmt(invalidez.adaptacionVivienda), 15, 'right')}         │
 └────────────────────────────────────────────────────────────────┘

 RECOMENDACIONES:
 ┌────────────────────────────────────────────────────────────────┐
 │  Capital seguro recomendado:       ${pad(fmt(vpPerdida + invalidez.adaptacionVivienda), 15, 'right')}         │
 │  Cobertura adicional sugerida:     ${pad(fmt(Math.max(0, vpPerdida + invalidez.adaptacionVivienda - invalidez.seguroPrivadoCapital)), 15, 'right')}         │
 └────────────────────────────────────────────────────────────────┘`;

  // ========== FOOTER ==========
  const footer = `

${line('═', 80)}
📧 RESUMEN ENVIADO DESDE: PlanFinanciero v2.0
📅 FECHA: ${fecha}
👤 CLIENTE: ${clientName || clientId}
📋 ID SESIÓN: ${clientId}
${line('═', 80)}

Datos completos para reimportación (JSON):
${JSON.stringify(state, null, 2)}
`;

  return hoja1 + hoja2 + hoja3 + hoja4 + hoja5 + hoja6 + hoja7 + hoja8 + footer;
};const SendToAdvisor = ({ clientId, clientName, state, onClose }) => {
  const [report] = useState(()=>buildAdvisorReport(clientId, state, clientName));
  const [copied, setCopied] = useState(false);
  const [sending, setSending] = useState(false);
  const [sent, setSent] = useState(false);
  const [sendError, setSendError] = useState('');

  const subject = `Plan Financiero — ${clientName||clientId} — ${new Date().toLocaleDateString('es-ES')}`;

  const sendDirect = async () => {
    setSending(true); setSendError('');
    const result = await sendEmailDirect({ subject, body: report, clientName });
    setSending(false);
    if (result.ok) {
      setSent(true);
      setTimeout(()=>onClose(), 2200);
    } else {
      setSendError('No se pudo enviar. Revisa tu conexión a Internet o utiliza una de las otras opciones (descargar/copiar/correo).');
    }
  };

  const openMail = () => {
    const shortBody = report.split('═══════════════════════════════════════\nDATOS COMPLETOS')[0]
      + '\n\n[El JSON completo va por separado — pulsa "Copiar al portapapeles" antes de enviar.]';
    const url = `mailto:${ADVISOR_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(shortBody)}`;
    window.location.href = url;
  };

  const copyAll = async () => {
    try {
      await navigator.clipboard.writeText(report);
      setCopied(true);
      setTimeout(()=>setCopied(false), 2000);
    } catch {
      alert('No se pudo copiar automáticamente. Selecciona el texto y cópialo manualmente.');
    }
  };

  const downloadTxt = () => {
    const blob = new Blob([report], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `plan-financiero-${(clientName||clientId).toString().replace(/[^a-zA-Z0-9]/g,'-')}-${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">📧 Enviar resumen a tu asesor</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          {sent ? (
            <div style={{padding:'40px 20px',textAlign:'center'}}>
              <div style={{fontSize:48,marginBottom:12}}>✅</div>
              <div style={{fontSize:18,fontWeight:700,color:'var(--green)',marginBottom:6}}>¡Enviado correctamente!</div>
              <div style={{fontSize:13,color:'var(--muted)'}}>Tu asesor ha recibido el resumen completo.</div>
            </div>
          ) : (
            <>
              <div style={{fontSize:12,color:'var(--muted)',marginBottom:10}}>
                Este resumen se enviará a <strong style={{color:'var(--navy)'}}>{ADVISOR_EMAIL}</strong>.
                Revísalo antes de enviar.
              </div>
              <div className="email-preview">{report}</div>
              {sendError && <div className="auth-error" style={{marginTop:12}}>⚠ {sendError}</div>}
            </>
          )}
        </div>
        {!sent && (
          <div className="modal-footer">
            <button className="modal-btn" onClick={downloadTxt}>📥 Descargar .txt</button>
            <button className="modal-btn" onClick={copyAll}>{copied?'✓ Copiado':'📋 Copiar'}</button>
            <button className="modal-btn" onClick={openMail}>✉ Abrir correo</button>
            <button className="modal-btn primary" onClick={sendDirect} disabled={sending} style={{minWidth:140}}>
              {sending ? '⏳ Enviando...' : '🚀 Enviar ahora'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
};

function App() {
  // Determine mode from URL: client mode if ?c=token, advisor mode otherwise
  const [clientCtx, setClientCtx] = useState(()=>CLIENT.parseUrl());
  const [demoMode, setDemoMode] = useState(false);
  const [showSendAdvisor, setShowSendAdvisor] = useState(false);
  const [activeTab, setActiveTab] = useState(()=>{try{return localStorage.getItem('fin_tab')||'sheet1'}catch{return'sheet1'}});

  // Effective client identity (token + name)
  const effectiveClient = clientCtx || (demoMode ? { token: 'demo', name: 'Modo Demo' } : null);
  const stateKey = effectiveClient ? `pf_state_${effectiveClient.token}` : null;

  const [state, setState] = useState(()=>{
    if (!stateKey) return INITIAL_STATE;
    try{
      const saved=localStorage.getItem(stateKey);
      if(!saved) return INITIAL_STATE;
      const parsed=JSON.parse(saved);
      return{...INITIAL_STATE,...parsed,
        gastos:(parsed.gastos||INITIAL_STATE.gastos).map(g=>({...g,confirmed:g.confirmed!==undefined?g.confirmed:true})),
        ingresos:(parsed.ingresos||INITIAL_STATE.ingresos).map(i=>({...i,confirmed:i.confirmed!==undefined?i.confirmed:true})),
        objetivos:(parsed.objetivos||INITIAL_STATE.objetivos).map(o=>({...o,confirmed:o.confirmed!==undefined?o.confirmed:true})),
        hipotecas:parsed.hipotecas||INITIAL_STATE.hipotecas,
        invalidez:{...INITIAL_STATE.invalidez,...(parsed.invalidez||{})},
        seguros:{...INITIAL_STATE.seguros,...(parsed.seguros||{})},
        balanceDetalle:{...INITIAL_STATE.balanceDetalle,...(parsed.balanceDetalle||{})},
      };
    }catch{return INITIAL_STATE}
  });

  // Reload state when client identity changes
  useEffect(()=>{
    if (!stateKey) return;
    try{
      const saved=localStorage.getItem(stateKey);
      if(saved){
        const parsed=JSON.parse(saved);
        setState({...INITIAL_STATE,...parsed,
          gastos:(parsed.gastos||INITIAL_STATE.gastos).map(g=>({...g,confirmed:g.confirmed!==undefined?g.confirmed:true})),
          ingresos:(parsed.ingresos||INITIAL_STATE.ingresos).map(i=>({...i,confirmed:i.confirmed!==undefined?i.confirmed:true})),
          objetivos:(parsed.objetivos||INITIAL_STATE.objetivos).map(o=>({...o,confirmed:o.confirmed!==undefined?o.confirmed:true})),
          hipotecas:parsed.hipotecas||INITIAL_STATE.hipotecas,
          invalidez:{...INITIAL_STATE.invalidez,...(parsed.invalidez||{})},
          seguros:{...INITIAL_STATE.seguros,...(parsed.seguros||{})},
          balanceDetalle:{...INITIAL_STATE.balanceDetalle,...(parsed.balanceDetalle||{})},
        });
      } else {
        setState(INITIAL_STATE);
      }
    }catch{ setState(INITIAL_STATE); }
  },[stateKey]);

  useEffect(()=>{
    if (!stateKey) return;
    try{localStorage.setItem(stateKey,JSON.stringify(state))}catch{}
  },[state, stateKey]);
  useEffect(()=>{try{localStorage.setItem('fin_tab',activeTab)}catch{}},[activeTab]);

  const resetState = () => {
    if(confirm('¿Restablecer todos los datos a los valores por defecto?')){
      setState(INITIAL_STATE);
      if (stateKey) try{localStorage.removeItem(stateKey)}catch{}
    }
  };

  // ADVISOR HOME (no token in URL, not in demo mode)
  if (!effectiveClient) {
    return <AdvisorHome onUseDemo={()=>setDemoMode(true)} />;
  }

  // PIN GATE: client mode with PIN hash in URL, not yet unlocked
  if (clientCtx && clientCtx.pinHash && !CLIENT.isUnlocked(clientCtx.token)) {
    return <PinGate
      token={clientCtx.token}
      name={clientCtx.name}
      expectedHash={clientCtx.pinHash}
      onUnlock={()=>setClientCtx({...clientCtx})} />;
  }

  // CLIENT MODE (or demo)
  const props={state,setState};
  const renderTab=()=>{switch(activeTab){case 'sheet1':return<Sheet1 {...props}/>;case 'sheet2':return<Sheet2 {...props}/>;case 'sheet3':return<Sheet3 {...props}/>;case 'sheet4':return<Sheet4 {...props}/>;case 'sheet5':return<Sheet5 {...props}/>;case 'sheet6':return<Sheet6 {...props}/>;case 'sheet7':return<Sheet7 {...props}/>;case 'sheet8':return<Sheet8 {...props}/>;default:return null;}};

  const isDemo = demoMode && !clientCtx;

  return (
    <>
      <header className="app-header">
        <div className="app-logo">💼 Plan<span>Financiero</span></div>
        <div style={{fontSize:11,color:'rgba(255,255,255,.7)',marginLeft:14}}>
          {isDemo ? '🧪 Modo demo — los datos no se guardan permanentemente' : <>Hola, <strong style={{color:'#fff'}}>{effectiveClient.name}</strong></>}
        </div>
        <div style={{marginLeft:'auto',display:'flex',gap:10,alignItems:'center'}}>
          <button className="send-advisor-btn" onClick={()=>setShowSendAdvisor(true)} title="Enviar resumen a tu asesor financiero">
            ✉ Enviar a mi asesor
          </button>
          <button onClick={resetState} style={{background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.2)',color:'white',padding:'5px 12px',borderRadius:6,cursor:'pointer',fontSize:11,fontFamily:'inherit'}}>↻ Restablecer</button>
          {isDemo && <button onClick={()=>setDemoMode(false)} style={{background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.2)',color:'white',padding:'5px 12px',borderRadius:6,cursor:'pointer',fontSize:11,fontFamily:'inherit'}}>← Volver al panel</button>}
        </div>
      </header>
      <nav className="tab-bar">{TABS.map(t=>(<button key={t.id} className={`tab ${activeTab===t.id?'active':''}`} onClick={()=>setActiveTab(t.id)}>{t.label}</button>))}</nav>
      <div className="main-scroll">{renderTab()}</div>

      {showSendAdvisor && <SendToAdvisor clientId={effectiveClient.token} clientName={effectiveClient.name} state={state} onClose={()=>setShowSendAdvisor(false)}/>}
    </>
  );
}
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
